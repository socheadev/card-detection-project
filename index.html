<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Production preview for browser-based baccarat card detection."
    />
    <title>Card Detector</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./vendor/hls.js/hls.min.js"></script>
  </head>

  <body>
    <div class="app-shell">
      <main class="workspace">
        <section class="stage-panel">
          <div class="viewer">
            <div class="viewer-stage">
              <video
                id="video"
                playsinline
                muted
                autoplay
                crossorigin="anonymous" >
              </video>

              <iframe
                id="remoteFrame"
                class="remote-frame"
                title="Remote stream player"
                allow="autoplay; fullscreen"
                loading="eager"
                hidden
              ></iframe>

              <canvas id="overlay"></canvas>

              <div
                id="roiEditorOverlay"
                class="roi-editor-overlay"
                aria-live="off"></div>

              <div
                id="cardsOverlay"
                class="cards-overlay"
                aria-live="polite"
              ></div>
            </div>
          </div>

          <div class="controls-panel">
            <!-- STREAM -->

            <div class="controls-section">
              <strong class="controls-title"> Stream </strong>

              <div class="controls-stack">
                <div class="control-row source-row">
                  <label class="field source-field">
                    <span>URL</span>

                    <input
                      id="sourceInput"
                      type="text"
                      spellcheck="false"
                      placeholder="Paste play.html?id=..., .m3u8, MP4..."
                    />
                  </label>

                  <div class="action-row">
                    <button id="loadStreamBtn" type="button">
                      Load Stream
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- MODEL -->

            <div class="controls-section">
              <strong class="controls-title"> Model </strong>

              <div class="controls-stack">
                <div class="control-row source-row">
                  <label class="field source-field">
                    <span>Broadcast URL</span>

                    <input
                      id="broadcastUrlInput"
                      type="text"
                      spellcheck="false"
                      placeholder="https://your-system.example/api/detections"
                    />
                  </label>

                  <div class="action-row">
                    <button id="toggleBroadcastBtn" type="button" class="secondary">
                      Start Broadcast
                    </button>
                  </div>
                </div>

                <div class="broadcast-settings-grid">
                  <label class="field">
                    <span>RabbitMQ URL</span>

                    <input
                      id="rabbitmqUrlInput"
                      type="text"
                      spellcheck="false"
                      placeholder="https://rabbitmq.example.com"
                    />
                  </label>

                  <label class="field">
                    <span>Vhost</span>

                    <input
                      id="rabbitmqVhostInput"
                      type="text"
                      spellcheck="false"
                      placeholder="/"
                    />
                  </label>

                  <label class="field">
                    <span>Exchange</span>

                    <input
                      id="rabbitmqExchangeInput"
                      type="text"
                      spellcheck="false"
                      placeholder="amq.direct"
                    />
                  </label>

                  <label class="field">
                    <span>Routing Key</span>

                    <input
                      id="rabbitmqRoutingKeyInput"
                      type="text"
                      spellcheck="false"
                      placeholder="card.detection"
                    />
                  </label>
                </div>

                <div class="control-row model-thresholds">
                  <div class="action-row">
                    <button id="toggleRoiEditorBtn" type="button" class="secondary">
                      Edit Boxs
                    </button>

                    <button id="loadRoiEditorBtn" type="button" class="secondary">
                      Load Boxs
                    </button>

                    <button id="saveRoiEditorBtn" type="button" class="secondary">
                      Save Boxs
                    </button>

                    <button id="resetRoiEditorBtn" type="button" class="ghost">
                      Reset Boxs
                    </button>
                  </div>

                  <label class="field mini-field">
                    <span>Confidence</span>

                    <input
                      id="confidenceInput"
                      type="number"
                      min="0.01"
                      max="1"
                      step="0.01"
                      value="0.25"
                    />
                  </label>

                  <label class="field mini-field">
                    <span>NMS IoU</span>

                    <input
                      id="iouInput"
                      type="number"
                      min="0.01"
                      max="1"
                      step="0.01"
                      value="0.70"
                    />
                  </label>

                  <label class="field mini-field">
                    <span>Interval (ms)</span>

                    <input
                      id="intervalInput"
                      type="number"
                      min="16"
                      max="2000"
                      step="1"
                      value="180"
                    />
                  </label>
                </div>

                <div
                  id="roiInputsPanel"
                  class="roi-inputs-panel"
                  aria-live="polite"
                ></div>
              </div>

              <div class="model-data-inline">
                <div class="panel-head">
                  <h2>Model Status</h2>

                  <span id="modelBadge"> Not loaded </span>
                </div>

                <div class="metric-grid">
                  <div class="metric metric-primary">
                    <span class="metric-label"> Status </span>

                    <strong id="statusText"> Waiting for stream </strong>
                  </div>

                  <div class="metric metric-primary">
                    <span class="metric-label"> Broadcast </span>

                    <strong id="broadcastStatusValue"> Disabled </strong>
                  </div>
                </div>

                <div class="raw-model-panel">
                  <div class="panel-head panel-head-compact">
                    <h2>Raw Model Output</h2>

                    <button
                      id="copyRawModelBtn"
                      class="secondary raw-copy-btn"
                      type="button"
                    >
                      Copy Data
                    </button>
                  </div>

                  <pre id="rawModelOutput" class="raw-model-output"></pre>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <input id="roiFileInput" type="file" accept="application/json,.json" hidden />

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
